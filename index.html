<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winnie Macharia | Developer Portfolio</title>
  
  <!-- Preconnect for faster fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- External CSS & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- FIXED NAVBAR - no logo, no Download CV button -->
  <div id="navbar-container" class="fixed-navbar"></div>
  
  <!-- SCROLLABLE CONTENT -->
  <div id="portfolio-shell" class="portfolio-shell">
    <main class="relative z-10">
      <div id="hero-container"></div>
      <div id="services-container"></div>
      <div id="skills-container"></div>
      <div id="projects-container"></div>
      <div id="contact-container"></div>
    </main>
    
    <div id="footer-container"></div>
  </div>
  
  <!-- Modal Container for Project Popups -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[10001] hidden items-center justify-center p-4">
    <div class="glass rounded-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto relative">
      <button id="modal-close" class="absolute top-4 right-4 text-white/60 hover:text-white text-3xl z-10">&times;</button>
      <div id="modal-content" class="p-6">
        <!-- Content loaded dynamically from JavaScript -->
      </div>
    </div>
  </div>
  
  <!-- Custom JavaScript -->
  <script src="js/script.js"></script>

    <!-- Floating AI Chat Button & Window -->
  <div id="chat-container" class="fixed bottom-5 right-5 z-[10002]">
    <!-- Chat Button -->
    <button id="chat-button" class="bg-gradient-to-r from-[#A855F7] to-[#F472B6] rounded-full p-3 shadow-lg hover:scale-105 transition-all duration-300">
    <img src="assets/images/chat.png" alt="Chat with AI" class="h-6 w-6 object-contain">
    </button>
    
    <!-- Chat Window (hidden by default) -->
    <div id="chat-window" class="absolute bottom-16 right-0 w-80 sm:w-96 glass rounded-2xl shadow-2xl hidden flex flex-col overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-r from-[#A855F7] to-[#F472B6] px-4 py-3 flex justify-between items-center">
        <div>
          <h3 class="text-white font-semibold">Chat with my CV</h3>
          <p class="text-white/70 text-xs">Ask me about skills, projects, or experience</p>
        </div>
        <button id="chat-close" class="text-white hover:text-white/80">&times;</button>
      </div>
      
      <!-- Messages Area -->
      <div id="chat-window-messages" class="min-h-0 flex-1 overflow-y-auto p-4 space-y-3">
        <div class="flex justify-start">
          <div class="glass rounded-2xl rounded-bl-none px-4 py-2 max-w-[85%]">
            <p class="text-sm text-white">👋 Hi! I'm Winnie's CV assistant. Ask me about my skills, projects, or experience!</p>
          </div>
        </div>
      </div>
      
      <!-- Input Area -->
      <div class="p-3 border-t border-white/10">
        <div class="flex gap-2">
          <input type="text" id="chat-window-input" placeholder="e.g., What projects have you built?" class="flex-1 glass rounded-full px-4 py-2 text-sm text-white placeholder:text-zinc-400 focus:outline-none focus:ring-1 focus:ring-[#F472B6]">
          <button id="chat-window-send" class="bg-gradient-to-r from-[#A855F7] to-[#F472B6] rounded-full p-2 px-4 text-white text-sm font-semibold">
            Send
          </button>
        </div>
        <p class="text-xs text-zinc-500 text-center mt-2">AI may make mistakes. Verify important info.</p>
      </div>
    </div>
  </div>
</body>
</html>
